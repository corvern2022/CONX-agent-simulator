<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONX Foundation AI Agent 시나리오 시뮬레이터</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f4ef;
      color: #2b2a28;
      --surface: #ffffff;
      --surface-soft: #f7f5ef;
      --border: rgba(43, 42, 40, 0.08);
      --shadow: 0 18px 45px rgba(38, 36, 33, 0.08);
      --radius: 24px;
      --green: #1d9e75;
      --yellow: #ba7517;
      --red: #a32d2d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f5f4ef 0%, #ece7dd 100%);
      color: #2b2a28;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── 버튼 ── */
    .button {
      border: 0;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button.primary {
      color: #fff;
      background: #2f3438;
      box-shadow: 0 14px 30px rgba(47,52,56,0.18);
    }

    .button.secondary {
      color: #2b2a28;
      background: rgba(43,42,40,.08);
    }

    .button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .button:not(:disabled):hover {
      transform: translateY(-1px);
    }

    /* ── hint-line (simulationBody 내부에서 사용) ── */
    .hint-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      color: #6d6761;
      font-size: 0.85rem;
    }

    .hint-line span {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      min-width: 110px;
      text-align: center;
      border-radius: 999px;
      background: #f4f1e8;
      color: #4e4a44;
    }

    .simulation.red .hint-line span {
      background: rgba(255,220,220,.75);
      color: #7d2424;
    }

    /* ── simulation ── */
    .simulation {
      display: grid;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .simulation.red .simulation-header {
      border-color: rgba(210,69,69,0.2);
      background: #fff1f1;
    }

    .simulation.red .simulation-header strong,
    .simulation.red .simulation-header h2 {
      color: #8a2323;
    }

    .simulation.red .node-item.active {
      border-color: #d64545;
      background: #fff2f2;
    }

    .simulation.red .node-item::after {
      background: #d64545;
    }

    .simulation.red .timeline-connector.active { background: #d64545; }

    .simulation.yellow .simulation-header,
    .simulation.yellow .node-item.active {
      border-color: #b87d13;
      background: #fff4d9;
    }

    .simulation.yellow .timeline-connector.active { background: #b87d13; }

    .simulation.green .simulation-header,
    .simulation.green .node-item.active {
      border-color: #1d9e75;
      background: #eaf8ef;
    }

    .simulation.green .timeline-connector.active { background: #1d9e75; }

    .simulation-header {
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-soft);
    }

    .simulation-header strong {
      display: block;
      font-size: 0.95rem;
      color: #6d6761;
      margin-bottom: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .simulation-header h2 {
      margin: 0;
      font-size: clamp(1.5rem, 2.3vw, 2rem);
      line-height: 1.1;
    }

    .simulation-body {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .node-list { display: grid; gap: 14px; }

    .node-item {
      border-radius: 20px;
      border: 1px solid rgba(43,42,40,.12);
      background: #fff;
      padding: 22px 24px;
      display: grid;
      gap: 12px;
      position: relative;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .35s ease, transform .35s ease, border-color .2s ease, background .2s ease;
    }

    .node-item.visible { opacity: 1; transform: translateY(0); }

    .node-item.active {
      border-color: var(--green);
      background: #eef7ef;
      transform: translateY(0);
    }

    .node-item.completed { background: #f3f7f3; }

    .node-item .node-step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #5b584f;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(47,52,56,.05);
      width: fit-content;
    }

    .simulation.red .node-item .node-step {
      background: rgba(214,69,69,.12);
      color: #8a2323;
    }

    .node-item .node-role {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #2b2a28;
    }

    .node-item .node-desc {
      margin: 0;
      color: #5b584f;
      line-height: 1.5;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .node-item::after {
      content: '';
      position: absolute;
      right: 20px;
      top: 20px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(43,42,40,.12);
    }

    .node-item.active::after { background: var(--green); }

    .timeline-connector {
      width: 4px;
      height: 36px;
      margin: 0 auto;
      border-radius: 999px;
      background: rgba(43,42,40,.12);
      opacity: 0;
      transition: opacity .35s ease, transform .35s ease;
      transform: translateY(-8px);
    }

    .timeline-connector.visible { opacity: 1; transform: translateY(0); }
    .timeline-connector.active { background: var(--green); }

    .typing-line {
      margin: 0;
      min-height: 24px;
      color: #2b2a28;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      white-space: pre;
      letter-spacing: 0.02em;
      opacity: 0.85;
    }

    .typing-cursor::after {
      content: '|';
      display: inline-block;
      margin-left: 4px;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink { to { opacity: 0; } }

    .empty-state {
      padding: 32px 24px;
      text-align: center;
      color: #6d6761;
      font-size: 1rem;
      line-height: 1.8;
    }

    /* ── 섹션 공통 ── */
    .section-overview,
    .section-select,
    .section-flow {
      margin-bottom: 52px;
    }

    .section-title {
      margin: 0 0 20px;
      font-size: clamp(1.2rem, 2vw, 1.5rem);
      color: #2b2a28;
    }

    /* ── 섹션 1: 시스템 오버뷰 ── */
    .overview-header { margin-bottom: 24px; }

    .overview-header h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      line-height: 1.1;
    }

    .overview-subtitle {
      margin: 0;
      color: #5b584f;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 760px;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .route-col {
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 20px;
      display: grid;
      gap: 14px;
      background: var(--surface);
      min-height: 520px;
      align-content: start;
    }

    .route-col.green  { border-color: rgba(29,158,117,.35); background: #f0faf5; }
    .route-col.yellow { border-color: rgba(186,117,23,.35); background: #fdf8ec; }
    .route-col.red    { border-color: rgba(163,45,45,.35); background: #fdf0f0; }

    .route-level-badge {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2b2a28;
    }

    .route-level-desc {
      margin: 0;
      font-size: 0.85rem;
      color: #5b584f;
      line-height: 1.5;
    }

    .route-examples {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 10px;
      max-width: 100%;
      margin: 0 auto;
    }

    .route-examples span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 0 1 calc(33% - 10px);
      min-width: 100px;
      max-width: 150px;
      min-height: 36px;
      padding: 10px 12px;
      font-size: 0.76rem;
      line-height: 1.3;
      border-radius: 999px;
      background: rgba(43,42,40,.08);
      color: #5b584f;
      overflow: hidden;
    }

    .route-col.green .route-examples span,
    .route-col.yellow .route-examples span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 38px;
      line-height: 1.3;
    }

    .route-col.red .route-examples span {
      flex: 0 1 calc(30% - 10px);
      min-width: 100px;
      max-width: 150px;
      padding: 10px 12px;
      font-size: 0.75rem;
      white-space: normal;
      line-height: 1.3;
      max-height: 58px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .route-chain {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .role-chip {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid rgba(43,42,40,.12);
      color: #2b2a28;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .role-chip.human {
      background: #fff7e6;
      border-color: rgba(186,117,23,.4);
      color: #7a4f00;
    }

    .role-chip.deploy {
      background: #f0f0f0;
      color: #5b584f;
      font-weight: 700;
    }

    .role-chip-level {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(43,42,40,.07);
      color: #6d6761;
      flex-shrink: 0;
    }

    .role-chip.human .role-chip-level {
      background: rgba(186,117,23,.12);
      color: #7a4f00;
    }

    .chain-arrow {
      color: rgba(43,42,40,.3);
      font-size: 1rem;
      padding: 3px 0 3px 14px;
      line-height: 1;
    }

    /* ── UI/UX 개선 1: 시나리오 카드 화살표 ── */
    .card-arrow {
      font-size: 1rem;
      color: rgba(43,42,40,.2);
      padding-right: 14px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.15s ease, transform 0.15s ease;
    }

    .scenario-card:hover .card-arrow {
      color: rgba(43,42,40,.45);
      transform: translateX(2px);
    }

    /* ── UI/UX 개선 2: 플로우 완료 배너 ── */
    .flow-complete-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      margin-top: 4px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 0.95rem;
      animation: fadeInUp 0.45s ease;
    }

    .flow-complete-banner.green  { background: #eaf8ef; border: 1px solid rgba(29,158,117,.2); color: #1d9e75; }
    .flow-complete-banner.yellow { background: #fff4d9; border: 1px solid rgba(186,117,23,.2); color: #ba7517; }
    .flow-complete-banner.red    { background: #ffe6e6; border: 1px solid rgba(163,45,45,.2); color: #a32d2d; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 섹션 2: 시나리오 선택 ── */
    .scenario-group { margin-bottom: 28px; }

    .group-heading {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 0;
      margin-bottom: 12px;
      color: #5b584f;
    }

    .group-heading.red    { color: var(--red); }
    .group-heading.yellow { color: var(--yellow); }
    .group-heading.green  { color: var(--green); }

    .scenario-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .scenario-card {
      display: flex;
      border-radius: 18px;
      border: 1.5px solid rgba(43,42,40,.12);
      background: var(--surface);
      box-shadow: 0 4px 14px rgba(38,36,33,.05);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      user-select: none;
      min-height: 88px;
    }

    .scenario-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(38,36,33,.1);
    }

    .scenario-card.green.selected  { border-color: #1d9e75; background: #f5fbf8; }
    .scenario-card.yellow.selected { border-color: #ba7517; background: #fdf9f0; }
    .scenario-card.red.selected    { border-color: #a32d2d; background: #fdf5f5; }

    .card-level-bar { width: 5px; flex-shrink: 0; }

    .scenario-card.green  .card-level-bar { background: #1d9e75; }
    .scenario-card.yellow .card-level-bar { background: #ba7517; }
    .scenario-card.red    .card-level-bar { background: #a32d2d; }

    .card-body {
      padding: 16px 16px 16px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      flex: 1;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #2b2a28;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .card-agent { font-size: 0.75rem; color: #6d6761; }

    .card-steps {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(43,42,40,.07);
      color: #5b584f;
    }

    /* ── 커스텀 입력 박스 ── */
    .custom-input-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-top: 8px;
    }

    .custom-input-label {
      margin: 0 0 12px;
      font-size: 0.9rem;
      color: #5b584f;
    }

    .search-input-group { display: grid; gap: 10px; }

    .search-input {
      width: 100%;
      border: 1px solid rgba(43,42,40,.15);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.95rem;
      color: #2b2a28;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-input:focus {
      border-color: rgba(29,158,117,.35);
      box-shadow: 0 0 0 4px rgba(29,158,117,.08);
    }

    .search-action {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── 섹션 3: 플로우 메타 헤더 ── */
    .flow-meta {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }

    .flow-meta-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .flow-level-badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
    }

    .flow-level-badge.green  { background: #eaf8ef; color: #1d9e75; }
    .flow-level-badge.yellow { background: #fff4d9; color: #ba7517; }
    .flow-level-badge.red    { background: #ffe6e6; color: #a32d2d; }

    .flow-title-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2b2a28;
      flex: 1;
    }

    .flow-agent-label { font-size: 0.85rem; color: #6d6761; }

    .flow-progress-wrap {
      height: 6px;
      border-radius: 999px;
      background: rgba(43,42,40,.1);
      overflow: hidden;
    }

    .flow-progress-bar {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .flow-progress-bar.green  { background: #1d9e75; }
    .flow-progress-bar.yellow { background: #ba7517; }
    .flow-progress-bar.red    { background: #a32d2d; }

    .flow-progress-label { font-size: 0.82rem; color: #6d6761; }

    /* ── 완료 버튼 ── */
    .flow-back-wrap {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    /* ── 섹션 0: 구조도 ── */
    .section-diagram {
      margin-bottom: 52px;
    }

    .diagram-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      overflow: hidden;
    }

    .diagram-card-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6d6761;
      margin: 0 0 20px;
    }

    .diagram-svg-wrap {
      width: 100%;
      overflow: visible;
    }

    .external-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1d70b8;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .external-link:hover {
      text-decoration: underline;
    }

    .agent-group {
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, stroke 0.18s ease;
      outline: none;
    }

    .agent-group:hover rect {
      filter: brightness(1.08);
    }

    .agent-group:focus-visible rect {
      stroke: #1d70b8;
      stroke-width: 2;
      filter: brightness(1.08);
    }

    .agent-group text {
      pointer-events: none;
    }

    .agent-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,15,.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .agent-popup.active {
      display: flex;
    }

    .agent-popup-card {
      width: min(560px, 100%);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
      position: relative;
    }

    .agent-popup-card h3 {
      margin: 0 0 12px;
      font-size: 1.2rem;
      color: #2b2a28;
    }

    .agent-popup-card p {
      margin: 0 0 18px;
      color: #5b584f;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .agent-popup-list {
      margin: 0;
      padding-left: 18px;
      color: #4e4a44;
      line-height: 1.7;
    }

    .agent-popup-list li {
      margin-bottom: 10px;
    }

    .agent-popup-close {
      position: absolute;
      top: 18px;
      right: 18px;
      border: none;
      background: #f4f1e8;
      color: #2b2a28;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }

    .agent-popup-close:hover {
      background: #ece5dc;
    }

    /* ── 반응형 ── */
    @media (max-width: 740px) {
      .page { padding: 20px 16px 40px; }
      .overview-grid { grid-template-columns: 1fr; }
      .scenario-card-grid { grid-template-columns: 1fr; }
      .search-action { justify-content: stretch; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- 섹션 0: 시스템 오버뷰 -->
    <section class="section-overview">
      <div class="overview-header">
        <h1>CONX Foundation AI Agent 시뮬레이터</h1>
                <p class="overview-subtitle">입력한 상황을 분류하고, 적합한 승인 흐름을 간편하게 확인합니다.</p>
        <p class="overview-meta"><a class="external-link" href="https://xpla.foundation" target="_blank" rel="noreferrer">공식 웹 문서 보기 ↗</a></p>
      </div>
      <div class="overview-grid" id="overviewGrid"></div>
    </section>

    function findScenario(query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) return null;
      const exact = scenarios.find(s =>
        s.keywords.some(k => normalized.includes(k.toLowerCase()))
      );
      if (exact) return exact;
      const scored = scenarios
        .map(s => {
          const score = s.keywords.reduce((sum, k) => {
            const key = k.toLowerCase();
            if (normalized.includes(key)) return sum + 4;
            return key.split(/\s+/).filter(Boolean)
              .reduce((sub, t) => sub + (normalized.includes(t) ? 1 : 0), sum);
          }, 0);
          return { scenario: s, score };
        })
        .filter(i => i.score > 0)
        .sort((a, b) => b.score - a.score);
      return scored.length ? scored[0].scenario : null;
    }

    function classifyLevelByRule(query) {
      const n = query.trim().toLowerCase();
      if (!n) return 'Green';
      if (ruleKeywords.red.some(k => n.includes(k)))    return 'Red';
      if (ruleKeywords.yellow.some(k => n.includes(k))) return 'Yellow';
      if (ruleKeywords.green.some(k => n.includes(k)))  return 'Green';
      return 'Yellow';
    }

    function getAgentLabel(scenario, query) {
      if (scenario && scenario.agent) return scenario.agent;
      const n = (query || '').trim().toLowerCase();
      if (!n) return '';
      if (/공시|유통량|cmc|코인마켓캡|coinmarketcap/.test(n)) return '공시 Agent';
      if (/계약|mou|binding|obligation|commit/.test(n))        return '법무/재무 Agent';
      if (/이벤트|세레모니|행사|커뮤니티|공지/.test(n))       return '커뮤니티 마케팅 Agent';
      if (/기술|테크|문서|개발/.test(n))                       return '테크 Agent';
      if (/cs|고객|문의|지원/.test(n))                         return 'CS Agent';
      if (/거래소/.test(n))                                     return 'BD Agent';
      return '';
    }

        : `<span>입력 기반 추론 흐름</span>`;

        <div class="hint-line" style="gap:10px; margin-bottom:16px;">
          <span>리스크 레벨: ${level}</span>
          <span>단계 수: ${items.length}</span>
          ${agentLabel ? `<span>담당: ${agentLabel}</span>` : ''}
          ${inferenceHint}
        </div>
        <div class="node-list">
          ${items.map((item, index) => `
            <div class="node-item" data-index="${index}"
                 data-type="${scenario ? item.role.toUpperCase() + ' : ' + item.result : item.label}">
              <div class="node-step">${scenario ? 'STEP ' + item.step : item.label}</div>
              <p class="node-role">${item.role}</p>
              <p class="typing-line"></p>
              <p class="node-desc">${scenario ? item.description : item.action}</p>
            </div>
            ${index < items.length - 1
              ? `<div class="timeline-connector" data-index="connector-${index}"></div>`
              : ''}
          `).join('')}
        </div>
      `;

      const nodes      = Array.from(simulationBody.querySelectorAll('.node-item'));
      const connectors = Array.from(simulationBody.querySelectorAll('.timeline-connector'));

      nodes.forEach((node, idx) => {
        node.classList.remove('active', 'completed', 'visible');
        node.style.transitionDelay = `${idx * 120}ms`;
      });
      connectors.forEach((c, idx) => {
        c.classList.remove('visible', 'active');
        c.style.transitionDelay = `${idx * 120 + 80}ms`;
      });

      clearButton.disabled = false;
      animateSteps(nodes, connectors, items.length);

      if (simulationArea) {
        simulationArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function animateSteps(nodes, connectors, totalSteps) {
      clearAnimationTimers();

      function updateProgress(completedCount) {
        const bar   = document.getElementById('flowProgressBar');
        const label = document.getElementById('flowProgressLabel');
        if (bar)   bar.style.width = `${(completedCount / totalSteps) * 100}%`;
        if (label) label.textContent = `${completedCount} / ${totalSteps} 단계`;
      }

      function typeText(element, text, callback) {
        element.textContent = '';
        element.classList.add('typing-cursor');
        let index = 0;
        const frame = () => {
          if (index <= text.length) {
            element.textContent = text.slice(0, index);
            index++;
            animationTimers.push(setTimeout(frame, 45));
          } else {
            element.classList.remove('typing-cursor');
            if (callback) callback();
          }
        };
        frame();
      }

      function showStep(idx) {
        if (idx >= nodes.length) {
          updateProgress(totalSteps);
          // 완료 배너
          const existingBanner = simulationBody.querySelector('.flow-complete-banner');
          if (!existingBanner) {
            const level = (simulationArea.className.match(/green|yellow|red/) || ['green'])[0];
            const banner = document.createElement('div');
            banner.className = `flow-complete-banner ${level}`;
            banner.innerHTML = `<span>✓</span> 모든 단계 완료 — 승인 프로세스가 정상적으로 처리됐습니다`;
            simulationBody.appendChild(banner);
          }
          const wrap = document.getElementById('flowBackWrap');
          if (wrap) wrap.hidden = false;
          return;
        }

        const node        = nodes[idx];
        const typeLine    = node.querySelector('.typing-line');
        const currentDesc = node.querySelector('.node-desc');

        nodes.slice(0, idx).forEach(prev => {
          prev.classList.add('completed');
          prev.classList.remove('active');
        });

        node.classList.add('visible', 'active');
        node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        if (idx > 0 && connectors[idx - 1]) {
          connectors[idx - 1].classList.add('visible', 'active');
        }

        updateProgress(idx);

        const text = node.dataset.type || '';
        if (typeLine && text) {
          typeText(typeLine, text, () => {
            if (currentDesc) currentDesc.style.opacity = '1';
            animationTimers.push(setTimeout(() => showStep(idx + 1), 900));
          });
        } else {
          animationTimers.push(setTimeout(() => showStep(idx + 1), 1100));
        }
      }

      showStep(0);
    }

    function renderOverview() {

          <div class="route-chain">
            ${cfg.chain.map((role, i) => {
              const isHuman  = cfg.humanIndex === i;
              const isDeploy = role === '배포';
              const lv       = cfg.chipLevels ? cfg.chipLevels[i] : '';

                <div class="role-chip ${isHuman ? 'human' : ''} ${isDeploy ? 'deploy' : ''}">

    function renderScenarioCards() {
      const container = document.getElementById('scenarioGroups');
      if (!container) return;
      container.innerHTML = groupOrder.map(group => {
        const cards = scenarios.filter(s => s.level === group.level);
        return `
          <div class="scenario-group">
            <div class="group-heading ${group.level.toLowerCase()}">${group.emoji} ${group.label}</div>
            <div class="scenario-card-grid">
              ${cards.map(s => {
                const steps = (flowTemplates[s.id] || s.flow || []).length;
                return `
                  <div class="scenario-card ${s.level.toLowerCase()}"
                       data-scenario-id="${s.id}"
                       role="button"
                       tabindex="0"
                       aria-label="${s.title} 시뮬레이션 시작">

                    <div class="card-body">

    // ── 초기 렌더링 ──────────────────────────────────

      scenarioInput.value = '';
      clearAnimationTimers();
      document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));

      document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');

    });
